<!doctype html>
<html lang="kk">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Edukz Student Portal</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#e2e8f0;--blue:#2563eb;--text:#0f172a;--muted:#64748b;--green:#16a34a;--orange:#ea580c}
*{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1100px;margin:0 auto;padding:24px}.hero{background:linear-gradient(135deg,#0b1f55,#16284c);color:#fff;border-radius:28px;padding:28px 24px;margin-bottom:18px;min-height:140px;display:flex;align-items:end}.hero h1{margin:0;font-size:42px}
.grid{display:grid;grid-template-columns:420px 1fr;gap:18px}.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 8px 24px rgba(15,23,42,.05)}
input,select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:16px;font-size:15px;margin-bottom:12px}.tabs{display:flex;gap:10px;margin-bottom:12px}.tab{flex:1;padding:13px;border-radius:16px;border:1px solid var(--line);background:#fff;font-weight:800;cursor:pointer}.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn{background:var(--blue);color:#fff;border:0;border-radius:16px;padding:13px 15px;font-weight:800;cursor:pointer}.btn.green{background:var(--green)}.btn.orange{background:var(--orange)}.muted{color:var(--muted)}.course{border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px}.row{display:flex;justify-content:space-between;gap:10px;align-items:center}.badge{padding:6px 10px;border-radius:999px;background:#eef2ff;color:#1d4ed8;font-size:12px;font-weight:800}.list{max-height:580px;overflow:auto}.hidden{display:none}@media(max-width:900px){.grid{grid-template-columns:1fr}.hero h1{font-size:34px}}
.small{font-size:13px}.link{word-break:break-all}.ok{background:#ecfdf5;color:#166534}.warn{background:#fff7ed;color:#c2410c}.danger{background:#fef2f2;color:#b91c1c}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero"><h1>EduKZ Student</h1></div>
  <div class="grid">
    <div class="card">
      <div class="tabs">
        <button class="tab active" id="tReg">Оқушы тіркелуі</button>
        <button class="tab" id="tLogin">Оқушы кіруі</button>
      </div>
      <div id="registerBox">
        <input id="r_name" placeholder="Аты-жөні">
        <input id="r_phone" placeholder="Телефон">
        <input id="r_email" placeholder="Email">
        <select id="r_center"></select>
        <button class="btn" onclick="registerStudent()">Тіркелу</button>
      </div>
      <div id="loginBox" class="hidden">
        <select id="l_center"></select>
        <input id="l_code" placeholder="Оқушы коды">
        <input id="l_pin" placeholder="PIN">
        <button class="btn" onclick="loginStudent()">Кіру</button>
      </div>
      <div id="profileBox" class="hidden" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <div class="row"><h2 style="margin:0">Курстар</h2><div class="muted small">Сатып алу → Kaspi/банк → Төледім → CRM ашу</div></div>
      <div class="list" id="courses"></div>
    </div>
  </div>
</div>
<script>
const LS={founder:'edukz_founder_state_v5',crm:'edukz_crm_state_v5',student:'edukz_student_state_v5'};
function seed(){if(!localStorage.getItem(LS.founder)){localStorage.setItem(LS.founder,JSON.stringify({centers:[{id:'c1',name:'Demo EduKZ',tariff:'pro',status:'approved',paymentLink:'https://pay.kaspi.kz/pay/demo123',paymentLabel:'Kaspi төлем',modules:['students','journal','staff','requests','courses','online_students','settings']}]}))} if(!localStorage.getItem(LS.crm)){localStorage.setItem(LS.crm,JSON.stringify({activeCenterId:'c1',students:[{id:'s1',centerId:'c1',fullName:'Айару Т.',phone:'+7 777 111 11 11',email:'a@edu.kz',code:'EDU1001',pin:'1111',status:'Белсенді'}],courses:[{id:'oc1',centerId:'c1',title:'Математика 7-сынып',price:44444,teacher:'Teacher',portalUrl:'https://eduonline-delta.vercel.app/'},{id:'oc2',centerId:'c1',title:'Ағылшын Beginner',price:30000,teacher:'Teacher',portalUrl:'https://eduonline-delta.vercel.app/'}],requests:[],enrollments:[]}))} if(!localStorage.getItem(LS.student)){localStorage.setItem(LS.student,JSON.stringify({activeCenterId:'c1',profile:null}))}}
seed();
const qs=s=>document.querySelector(s); const qsa=s=>[...document.querySelectorAll(s)];
function getFounder(){return JSON.parse(localStorage.getItem(LS.founder)||'{}')} function getCRM(){return JSON.parse(localStorage.getItem(LS.crm)||'{}')} function saveCRM(v){localStorage.setItem(LS.crm,JSON.stringify(v))} function getStudent(){return JSON.parse(localStorage.getItem(LS.student)||'{}')} function saveStudent(v){localStorage.setItem(LS.student,JSON.stringify(v))}
function fmt(n){return new Intl.NumberFormat('kk-KZ').format(n)+' ₸'}
function fillCenters(){const centers=getFounder().centers.filter(x=>x.status==='approved'); ['#r_center','#l_center'].forEach(sel=>{qs(sel).innerHTML=centers.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')})}
function switchTab(login=false){qs('#registerBox').classList.toggle('hidden',login);qs('#loginBox').classList.toggle('hidden',!login);qs('#tReg').classList.toggle('active',!login);qs('#tLogin').classList.toggle('active',login)}
qs('#tReg').onclick=()=>switchTab(false); qs('#tLogin').onclick=()=>switchTab(true);
function registerStudent(){const crm=getCRM(), st=getStudent(); const centerId=qs('#r_center').value; const fullName=qs('#r_name').value.trim(), phone=qs('#r_phone').value.trim(), email=qs('#r_email').value.trim(); if(!fullName||!phone||!email) return alert('Барлығын толтыр'); const code='EDU'+(1000+crm.students.length+1), pin=String(1111+crm.students.length); const student={id:'s'+Date.now(),centerId,fullName,phone,email,code,pin,status:'Белсенді'}; crm.students.push(student); saveCRM(crm); st.profile=student; st.activeCenterId=centerId; saveStudent(st); renderProfile(); renderCourses(); alert('Тіркелдің. Кіру үшін кодың: '+code+' PIN: '+pin)}
function loginStudent(){const crm=getCRM(), st=getStudent(); const centerId=qs('#l_center').value, code=qs('#l_code').value.trim(), pin=qs('#l_pin').value.trim(); const found=crm.students.find(x=>x.centerId===centerId&&x.code===code&&x.pin===pin); if(!found) return alert('Код немесе PIN қате'); st.profile=found; st.activeCenterId=centerId; saveStudent(st); renderProfile(); renderCourses(); alert('Сәтті кірдің')}
function renderProfile(){const st=getStudent(); const box=qs('#profileBox'); if(!st.profile){box.classList.add('hidden'); return;} box.classList.remove('hidden'); box.innerHTML=`<div class="badge">${st.profile.fullName}</div><div class="small muted" style="margin-top:8px">Код: ${st.profile.code} • PIN: ${st.profile.pin}</div>`}
function openBank(courseId){const founder=getFounder(), st=getStudent(); if(!st.profile) return alert('Алдымен тіркел не кір'); const center=founder.centers.find(x=>x.id===st.profile.centerId); const crm=getCRM(); const course=crm.courses.find(x=>x.id===courseId); if(!crm.requests.some(r=>r.studentId===st.profile.id&&r.courseId===courseId)){crm.requests.push({id:'r'+Date.now(),centerId:st.profile.centerId,studentId:st.profile.id,student:st.profile.fullName,courseId:course.id,course:course.title,price:course.price,paymentStatus:'pending',accessStatus:'closed',proofSent:false,createdAt:new Date().toISOString()}); saveCRM(crm);} if(center?.paymentLink){window.open(center.paymentLink,'_blank')} else alert('Орталық төлем ссылкасын қоймаған'); renderCourses();}
function paid(courseId){const st=getStudent(); if(!st.profile) return; const crm=getCRM(); const req=crm.requests.find(r=>r.studentId===st.profile.id&&r.courseId===courseId); if(!req) return alert('Алдымен Сатып алу бас'); req.proofSent=true; req.paymentStatus=req.paymentStatus==='paid'?'paid':'review'; saveCRM(crm); renderCourses(); alert('Төлем тексеруге жіберілді')}
function renderCourses(){const crm=getCRM(), st=getStudent(); const centerId=(st.profile?.centerId)||qs('#r_center').value||'c1'; const courses=crm.courses.filter(x=>x.centerId===centerId); qs('#courses').innerHTML=courses.map(c=>{const req=crm.requests.find(r=>st.profile && r.studentId===st.profile.id&&r.courseId===c.id); const enr=crm.enrollments.find(e=>st.profile && e.studentId===st.profile.id&&e.courseId===c.id&&e.access==='active'); let status='<span class="badge danger">Жабық</span>'; if(req && req.paymentStatus==='review') status='<span class="badge warn">Тексерілуде</span>'; if(req && req.paymentStatus==='paid') status='<span class="badge ok">Төленді</span>'; if(enr) status='<span class="badge ok">Ашық</span>';
 return `<div class="course"><div class="row"><div><strong>${c.title}</strong><div class="muted small">${c.teacher}</div></div><div><strong>${fmt(c.price)}</strong></div></div><div style="margin:10px 0">${status}</div><div class="row"><div class="small muted">${req?`Төлем: ${(req.paymentStatus==='review'?'тексерілуде':req.paymentStatus==='paid'?'расталды':'күтілуде')}`:'Әлі өтінім жоқ'}</div></div><div class="row" style="margin-top:12px;gap:8px;flex-wrap:wrap"><button class="btn" onclick="openBank('${c.id}')">Сатып алу</button><button class="btn orange" onclick="paid('${c.id}')">Төледім</button>${enr?`<a class="btn green" style="text-decoration:none;display:inline-flex;align-items:center" href="${c.portalUrl}" target="_blank">Сабаққа кіру</a>`:''}</div></div>`}).join('')||'<div class="muted">Курс жоқ</div>'}
window.addEventListener('storage',()=>{fillCenters();renderProfile();renderCourses()});
fillCenters();renderProfile();renderCourses();
</script>
</body></html>
